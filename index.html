<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SafeSteps Toronto</title>

<!-- MAPBOX -->
<script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet"/>

<!-- GEOCODER -->
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
<link rel="stylesheet"
href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css"/>

<!-- Turf -->
<script src="https://unpkg.com/@turf/turf@7.2.0/turf.min.js"></script>

<link rel="stylesheet" href="style.css" />

</head>

<body>

<div id="controls">
  <div id="search-card">
    <div id="search-icons">
      <span id="icon-circle"></span>
      <span id="icon-dots">&#8942;</span>
      <span id="icon-pin">&#9679;</span>
    </div>
    <div id="search-inputs">
      <div id="geocoder-start"></div>
      <div id="input-divider"></div>
      <div id="geocoder-end"></div>
    </div>
    <button id="swap-btn" title="Swap">&#8693;</button>
  </div>

  <div id="route-toggle">
    <button class="toggle-btn active" data-mode="both">Both</button>
    <button class="toggle-btn" data-mode="fastest">Fastest</button>
    <button class="toggle-btn" data-mode="safest">Safest</button>
  </div>

  <div id="status" style="display:none"></div>

  <div id="info" style="display:none">
    <div id="fastest-row" class="route-row">
      <span class="swatch" style="background:#1976d2"></span>
      <b>Fastest</b> &mdash; <span id="fastest-time">--</span>
    </div>
    <div id="safest-row" class="route-row">
      <span class="swatch" style="background:#388e3c"></span>
      <b>Safest</b> &mdash; <span id="safest-time">--</span>
      <div class="route-sub"><span id="safest-reduction"></span></div>
    </div>
    <div id="same-route-note" style="display:none" class="route-sub">
      This is the fastest and safest route available.
    </div>
  </div>
</div>

<div id="legend">
  <div class="legend-title">Violent Crime Rate (2022)</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#fff5f0"></span> Very low</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#fcbba1"></span> Low</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#fb6a4a"></span> Medium</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#de2d26"></span> High</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#a50f15"></span> Very high</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#67000d"></span> Extreme</div>
  <div class="legend-divider"></div>
  <div class="legend-row"><span class="legend-circle" style="background:#e31837"></span> TTC stops</div>
  <div class="legend-row"><span class="legend-line" style="background:#1976d2"></span> Fastest route</div>
  <div class="legend-row"><span class="legend-line" style="background:#388e3c"></span> Safest route</div>
</div>

<div id="map" class="map"></div>

<script src="script.js"></script>

</body>
</html>
